  <script>
    (function () {
      var nodes = [];
      var skip = { script: 1, style: 1, noscript: 1, link: 1 };

      function isHome() { return window.location.pathname === '/'; }

      function applyAll() {
        var show = isHome();
        for (var i = 0; i < nodes.length; i++) {
          nodes[i].style.setProperty('display', show ? '' : 'none', 'important');
        }
      }

      // Catch widget elements as they're injected into <body>
      new MutationObserver(function (mutations) {
        mutations.forEach(function (m) {
          m.addedNodes.forEach(function (node) {
            if (!(node instanceof HTMLElement)) return;
            if (skip[node.tagName.toLowerCase()]) return;
            if (node.id === 'root') return;
            nodes.push(node);
            if (!isHome()) node.style.setProperty('display', 'none', 'important');
          });
        });
      }).observe(document.body, { childList: true });

      // Detect SPA navigation (wouter uses history.pushState)
      function onNav() { setTimeout(applyAll, 0); }
      var _push = history.pushState.bind(history);
      var _replace = history.replaceState.bind(history);
      history.pushState = function () { _push.apply(history, arguments); onNav(); };
      history.replaceState = function () { _replace.apply(history, arguments); onNav(); };
      window.addEventListener('popstate', onNav);

      window.__applyWidgetVisibility = applyAll;
    })();
  </script>
